services:
  mongo:
    image: mongo:7
    container_name: pbp-planner-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: pbp-planner-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pbp-planner-api
    command: npm run dev:server
    environment:
      MONGODB_URI: mongodb://mongo:27017/pbp-planner
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - mongo
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pbp-planner-client
    command: sh -c "npm install --include=dev && npm run dev -- --host 0.0.0.0"
    environment:
      NODE_ENV: development
      VITE_PROXY_TARGET: http://api:3001
    ports:
      - "5173:5173"
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - api

volumes:
  mongo_data:
