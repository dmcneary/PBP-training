name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGODB_TEST_URI: mongodb://127.0.0.1:27017/pbp-planner-test
      SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
      - name: Install server dependencies
        run: npm ci
      - name: Run server tests
        run: npm run test:server
      - name: Install client dependencies
        run: npm ci
        working-directory: client
      - name: Run client tests
        run: npm run test:client
      - name: Build client
        run: npm run build:client
      - name: Smoke production server
        shell: bash
        run: |
          NODE_ENV=production PORT=3001 SECRET=ci-test-secret MONGODB_URI=mongodb://127.0.0.1:27017/pbp-planner-test npm start > /tmp/pbp-planner.log 2>&1 &
          server_pid=$!
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3001/api/health; then
              kill "$server_pid"
              wait "$server_pid" || true
              exit 0
            fi
            sleep 1
          done
          cat /tmp/pbp-planner.log
          kill "$server_pid" || true
          exit 1
